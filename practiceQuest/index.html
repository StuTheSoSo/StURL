<!DOCTYPE html>
<html>
<head>
    <!-- SOCIAL MEDIA PREVIEW (OG TAGS) -->
    <meta property="og:title" content="Download PracticeQuest" />
    <meta property="og:description" content="Master your musical practice with PracticeQuest." />
    <!-- Replace 'yourusername' and 'your-repo' with your actual GitHub details -->
    <meta property="og:image" content="https://github.io" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.io" />

    <title>Redirecting to PracticeQuest...</title>

    <script>
        (function() {
            var ios = "https://apps.apple.com/us/app/practicequest/id6758678759";
            var android = "https://play.google.com/store/apps/details?id=com.practissimo.app";
            var fallback = "https://apps.apple.com/us/app/practicequest/id6758678759"; // Using iOS as default fallback

            var ua = navigator.userAgent.toLowerCase();
            
            if (/iphone|ipad|ipod/.test(ua)) {
                window.location.replace(ios);
            } else if (/android/.test(ua)) {
                window.location.replace(android);
            } else {
                // For desktop users, send to the App Store or your website
                window.location.replace(fallback);
            }
        })();
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <p>Opening PracticeQuest in the App Store...</p>
    <p><small>If it doesn't open, <a href="https://apps.apple.com/us/app/practicequest/id6758678759">click here</a>.</small></p>
