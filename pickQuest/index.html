<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SOCIAL MEDIA PREVIEW (OG TAGS) -->
    <meta property="og:title" content="Download PickQuest" />
    <meta property="og:description" content="Embark on your journey with PickQuest." />
    <meta property="og:image" content="https://github.com/StuTheSoSo/StURL/blob/main/pickQuest/icon.png?raw=true" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stu-thesoso.github.io/StURL/pickQuest/" />

    <title>Redirecting to PickQuest...</title>

    <script>
        (function() {
            var ios = "https://apps.apple.com/us/app/pickquest/id6760567578";
            var android = "https://play.google.com/store/apps/details?id=com.pickquest.app";
            // Set fallback to App Store so desktop users still see your app
            var fallback = ios; 

            var ua = navigator.userAgent.toLowerCase();
            
            // Modern iPhone detection (handles 'Request Desktop Site' mode)
            var isIOS = /iphone|ipad|ipod/.test(ua);
            var isMacWithTouch = (ua.indexOf("macintosh") > -1 && navigator.maxTouchPoints > 0);

            if (isIOS || isMacWithTouch) {
                window.location.replace(ios);
            } else if (/android/.test(ua)) {
                window.location.replace(android);
            } else {
                window.location.replace(fallback);
            }
        })();
    </script>
</head>
<body style="font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; color: #333; background-color: #f9f9f9;">
    <img src="https://github.com/StuTheSoSo/StURL/blob/main/pickQuest/icon.png?raw=true" width="120" style="border-radius: 22%; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <p style="font-size: 1.2em;">Opening <strong>PickQuest</strong>...</p>
    <p><small>If the store doesn't open, <a id="manual-link" href="https://apps.apple.com/us/app/pickquest/id6760567578">click here</a>.</small></p>
</body>
</html>
